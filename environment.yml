name: hinglish_pipeline
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - ffmpeg
  # espeak-ng: install via brew install espeak-ng

  - pip:
    # Core ML (pinned tight to avoid conflicts)
    - torch==2.1.2
    - torchaudio==2.1.2
    - torchvision==0.16.2
    - numpy==1.26.4            # TTS 0.22.0 breaks with numpy>=2.0
    - scipy==1.11.4

    # Transformers stack (pinned to stable compatible set)
    - transformers==4.36.2
    - datasets==2.16.1
    - accelerate==0.26.1
    - tokenizers==0.15.2
    - safetensors==0.4.2
    - huggingface-hub==0.20.3

    # Audio 
    - librosa==0.10.1
    - soundfile==0.12.1
    - openai-whisper==20231117
    - speechbrain==0.5.16
    - pyannote.audio==3.1.1
    - noisereduce==3.0.0
    - pydub==0.25.1
    - webrtcvad==2.0.10
    - spafe==0.3.2

    # TTS (0.22.0 is last version with stable deps) 
    - TTS==0.22.0

    # NLP 
    - phonemizer==3.2.1
    - epitran==1.24
    - sentencepiece==0.1.99
    - sacrebleu==2.3.1
    - nltk==3.8.1

    # Utilities 
    - scikit-learn==1.3.2
    - pandas==2.1.4
    - matplotlib==3.8.2
    - seaborn==0.13.0
    - tqdm==4.66.1
    - pyyaml==6.0.1
    - omegaconf==2.3.0
    - ffmpeg-python==0.2.0
    - yt-dlp==2023.12.30
    - dtaidistance==2.3.10
    - fastdtw==0.3.4
